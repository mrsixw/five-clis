name: CI

on:
  pull_request:
  push:

permissions: read-all

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Run tests
        run: make test

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Run lint
        run: make lint

  build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Build binary
        run: make build

      - name: Verify binary version
        run: utils/check_binary_version.sh

  spell:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check spelling
        uses: crate-ci/typos@v1.42.2

  docs-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint markdown docs
        run: make docs-lint

  man:
    runs-on: ubuntu-latest
    needs: [test, lint, spell, docs-lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Generate man page
        run: make man

      - name: Verify man page
        run: |
          test -f man1/five-clis.1.gz
          man -l man1/five-clis.1.gz | head -1 | grep -q "five-clis"

  completions:
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Generate completion scripts
        run: make completions

      - name: Install zsh and fish
        run: sudo apt-get install -y zsh fish

      - name: Verify completion scripts exist
        run: |
          test -f completions/five-clis.bash
          test -f completions/_five-clis
          test -f completions/five-clis.fish

      - name: Verify --completion flag works for all shells
        run: |
          uv run five-clis --completion bash | grep -q "_FIVE_CLIS_COMPLETE"
          uv run five-clis --completion zsh | grep -q "_FIVE_CLIS_COMPLETE"
          uv run five-clis --completion fish | grep -q "_FIVE_CLIS_COMPLETE"

  release:
    if: "github.ref == 'refs/heads/main' && github.event_name == 'push' && !startsWith(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    needs: [build, man, completions]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install git-mkver
        run: utils/install_git_mkver.sh

      - name: Fetch tags
        run: git fetch --tags

      - name: Read version
        id: version
        run: echo "version=$(python utils/read_version.py)" >> "$GITHUB_OUTPUT"

      - name: Bump version if tag exists
        id: bump
        run: |
          version="$(utils/bump_version_if_tag_exists.sh "${{ steps.version.outputs.version }}")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        run: make release

      - name: Generate man page
        run: make man

      - name: Generate completion scripts
        run: make completions

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: utils/create_release.sh "${{ steps.bump.outputs.version }}"

  verify-release:
    if: "github.ref == 'refs/heads/main' && github.event_name == 'push' && !startsWith(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install latest release
        run: |
          curl -sSL https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/install.sh | bash

      - name: Verify installation
        run: ~/.local/bin/five-clis --version
